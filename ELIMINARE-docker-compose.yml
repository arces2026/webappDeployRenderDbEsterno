# Docker Compose file per gestire un'applicazione full-stack con:
# - MariaDB (database)
# - Django (backend)
# - Vue.js (frontend)

# Definizione dei servizi (container) che compongono l'applicazione
services:
  
  # ============================================
  # SERVIZIO 2: Backend Django
  # ============================================
  backend:
    # Build dell'immagine usando il Dockerfile nella cartella specificata
    build:
      context: ./django-backend
      dockerfile: Dockerfile.dev

    # Nome personalizzato per il container Django
    container_name: django-backend

    # Comando eseguito all'avvio del container:
    # 1. wait-for-it.sh: attende che il database sia pronto (massimo 30 secondi)
    # 2. Poi avvia il server di sviluppo Django sulla porta 8000
    command: >
        sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

    # Politica di restart: ricarica automaticamente a meno che non venga fermato manualmente
    restart: unless-stopped

    # File delle variabili d'ambiente (condiviso con db)
    env_file:
      - .env

    # Volumi: monta il codice sorgente nel container
    # Così le modifiche locali si riflettono immediatamente (hot-reload)
    volumes:
      - ./django-backend:/app

    # Mappatura delle porte:
    # - Porta host (8000) → Porta container (8000)
    ports:
      - "8000:8000"

  # # ============================================
  # # SERVIZIO 3: Frontend Vue.js
  # # ============================================
  # frontend:
  #   # Build dell'immagine usando il Dockerfile nella cartella specificata
  #   build:
  #     context: ./frontend-vue

  #   # Nome personalizzato per il container Vue
  #   container_name: frontend-vue

  #   # Mappatura delle porte:
  #   # - Porta host (8080) → Porta container (80)
  #   # Il container espone la porta 80 perché usa Nginx per servire i file statici
  #   ports:
  #     - "8080:80"

  #   # Monta il file nginx.conf per configurare Nginx (SOPPRIME la configurazione predefinita)
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro # :ro = read-only per sicurezz

  #   # Dipendenze: questo servizio parte DOPO backend
  #   # Nota: non usa condition: service_healthy perché Django non ha un healthcheck
  #   depends_on:
  #     - backend

  # ============================================
  # SERVIZIO 3: Frontend Vue - DEVELOPMENT MODE
  # ============================================
  # frontend-dev:
  #   build:
  #     context: ./frontend-vue
  #     target: development
  #   container_name: frontend-vue-dev
  #   ports:
  #     - "8080:5173"
  #   volumes:
  #     - ./frontend-vue:/app
  #     - /app/node_modules
  #   environment:
  #     - NODE_ENV=development
  #     - CHOKIDAR_USEPOLLING=true
  #   depends_on:
  #     - backend

  # ============================================
  # SERVIZIO 4: Frontend Vue - PRODUCTION MODE
  # ============================================
  frontend-prod:
    build:
      context: ./frontend-vue
      target: production
    container_name: frontend-vue-prod
    ports:
      - "8080:80"
    depends_on:
      - backend

# ============================================
# VOLUMI PERSISTENTI
# ============================================
# volumes:
  # Volume per i dati di MariaDB
  # Questo garantisce che i dati del database sopravvivano alla rimozione del container
  # mariadb_data:
    # driver: local (default) - opzionale, specifica il driver di storage
