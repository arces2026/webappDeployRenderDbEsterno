services:

  # ============================================
  # BACKEND Django
  # ============================================
  backend:
    build:
      context: ./django-backend
      dockerfile: Dockerfile.dev
    container_name: django-backend
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./django-backend:/app
    ports:
      - "8000:8000"

  # ============================================
  # FRONTEND Vue.js - DEVELOPMENT
  # Use this locally: hot reload, no rebuild needed
  # ============================================
  frontend-dev:
    build:
      context: ./frontend-vue
      target: development
    container_name: frontend-vue-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-vue:/app        # your local files → container (hot reload)
      - /app/node_modules          # keep container's node_modules isolated
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  # ============================================
  # FRONTEND Vue.js - PRODUCTION PREVIEW
  # Only use this to test the production build locally
  # On Render, this stage is built automatically
  # ============================================
  frontend-prod:
    build:
      context: ./frontend-vue
      target: production
      args:
        - VITE_API_URL=http://localhost:8000   # swap for real URL when testing prod build
    container_name: frontend-vue-prod
    ports:
      - "8080:80"
    depends_on:
      - backend